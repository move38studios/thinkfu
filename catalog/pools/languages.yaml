# Languages for translation-based thinking moves.
# Each language has structural properties that make different concepts visible.
# Include notes on what each language does distinctively.

# Major world languages with distinctive structures
- Mandarin Chinese  # compound characters reveal conceptual structure, tonal, topic-prominent
- Japanese  # three writing systems, honorific levels encode social relationships
- Arabic  # root-based morphology, 3-consonant roots reveal word families
- Russian  # aspect system (perfective/imperfective) forces precision about completion
- German  # compound nouns create new concepts by combination, case system
- French  # grammatical gender, formal/informal address
- Spanish  # ser vs estar (two kinds of "to be"), subjunctive mood for uncertainty
- Portuguese  # saudade (untranslatable longing), personal infinitive
- Hindi  # ergative-absolutive alignment, honorific system
- Korean  # agglutinative, speech levels encode social hierarchy
- Turkish  # evidentiality markers (did you see it yourself or hear about it?)
- Finnish  # 15 grammatical cases, no gendered pronouns
- Hebrew  # root-based like Arabic, reads right-to-left, ancient-modern continuity
- Swahili  # noun class system groups concepts by shape/size/animacy
- Indonesian  # no tenses, no articles, radical simplicity

# Languages with unique conceptual properties
- Ancient Greek  # multiple words for love (agape, eros, philia, storge)
- Latin  # no articles, flexible word order, precision through case endings
- Sanskrit  # 96 words for "love", compound formation, grammatical tradition
- Icelandic  # creates new words from native roots instead of borrowing
- Irish Gaelic  # no word for "yes" or "no", ownership expressed as "X is at me"
- Navajo  # verb-centric, classifies objects by shape in the verb itself
- Pirahã  # no numbers, no recursion, radical present-tense focus
- Hawaiian  # 200+ words for rain, spatial rather than temporal orientation
- Yiddish  # untranslatable words for specific social situations (chutzpah, kvetch, mensch)
- Sign Language (ASL)  # spatial grammar, simultaneous not sequential, visual-spatial cognition
- Esperanto  # designed for clarity, regular rules, no exceptions
- Classical Chinese  # extreme compression, one character per concept, ambiguity as feature
