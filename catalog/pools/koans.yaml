# Paradoxes, impossible questions, and contemplative prompts.
# Each should create productive confusion -- a question that can't be
# answered analytically but shifts perspective when sat with.
# Mix Zen koans, philosophical paradoxes, and creative provocations.

# Classic Zen koans
- What was your face before your parents were born?
- What is the sound of one hand clapping?
- If you meet the Buddha on the road, kill him.
- Does a dog have Buddha-nature?
- What moves -- the flag, the wind, or your mind?
- Show me your original face, the one you had before the world was made.
- When you can do nothing, what can you do?
- What is the color of wind?
- If you speak, I will hit you. If you don't speak, I will hit you.
- Where does a fist go when you open your hand?
- A monk asked Zhaozhou, "Has a dog Buddha-nature or not?" Zhaozhou said, "Mu."
- Nan-in served tea. He poured until the cup overflowed. "Like this cup, you are full. How can I show you Zen unless you first empty your cup?"
- A monk asked, "What is the meaning of Bodhidharma coming from the west?" The master said, "The cypress tree in the garden."
- The student asked, "What is enlightenment?" The master said, "Have you eaten your rice porridge?" "Yes." "Then wash your bowl."
- Two monks were arguing about a flag. One said the flag was moving. The other said the wind was moving. The master said, "Neither. Your mind is moving."
- Before enlightenment, chop wood, carry water. After enlightenment, chop wood, carry water.
- The master held up a stick and said: "If you call this a stick, I will hit you. If you don't call it a stick, I will hit you. What do you call it?"
- Shuzan held up a short staff and said, "Call this a short staff and you negate its reality. Don't call it a short staff and you ignore the fact. Now, what do you wish to call this?"
- A student said, "I have nothing." The master said, "Throw it away."
- Zuigan called to himself every day, "Master!" and answered, "Yes?" "Are you awake?" "Yes!" "Don't be deceived by others!" "No, I won't!"
- The master pointed at the moon. The student stared at the finger.
- What is the sound of the rain when you're not listening?
- How do you step off the top of a hundred-foot pole?

# Philosophical paradoxes
- What is the opposite of a problem?
- Can you solve a problem by making it bigger?
- If you had no constraints, would you still choose this?
- If everyone agrees, who is wrong?
- What if the obstacle is the path?
- Can you improve something by leaving it alone?
- What would perfect failure look like?
- If you could not measure it, would it still matter?
- Can something be finished without being complete?
- Can something be complete without being finished?
- What is the difference between simplicity and emptiness?
- What changes when nothing changes?
- When does a repair become a replacement?
- What is the last question?
- How much complexity can you remove before the thing stops being itself?
- If the map disagrees with the territory, which one do you fix?
- Can you hold two contradictory ideas and act on both?
- What would it mean to solve this problem too well?
- Is the absence of a pattern itself a pattern?
- If you reverse the cause and the effect, does it still make sense?
- What is the boundary between signal and noise?
- Can you arrive somewhere you've never left?
- What is the weight of a decision not made?
- When does a tool become a cage?
- What would remain if you subtracted yourself from the problem?

# Creative provocations
- If the solution were already here, where would it be hiding?
- What would this look like if it were easy?
- What are you pretending not to know?
- What would you do if you knew you couldn't fail?
- What would you stop doing if nobody were watching?
- What is the question you're afraid to ask?
- What would remain if you removed everything that isn't essential?
- If this problem were a gift, what would it be teaching you?
- What would a tree do?
- What is between yes and no?
- If you already had the answer, what question would it belong to?
- What would you build if you had to explain it to no one?
- What is the shape of your confusion?
- Where does understanding go when you lose it?
- What would you attempt if your tools didn't exist?
- If this system could speak, what would it complain about?
- What is the last thing you'd want to hear about your solution?
- What would make this problem beautiful?
- If you could only keep one part, which part would keep you?
- What would this problem say about you behind your back?
- What if the user is wrong about what they want?
- What would you do if you had to solve this with your eyes closed?
- What would this look like from the inside?
- What is the smallest possible version of this that still matters?
- What would an enemy design to defeat your solution?
- What would you do if you had to start over but couldn't use any of your current ideas?
- What if this problem doesn't want to be solved?
- What would a river do with this obstacle?
- If you could only ask one question, what would it be?
- What would someone who doesn't care about the outcome do?
- What is hiding behind your first answer?
- What would you do if the deadline were yesterday?
- What would you do if the deadline were never?
- What would you notice if you slowed down by half?
- What is the conversation this problem is trying to start?
- If you woke up and it was solved, what would be different?
- What would you do if you were not allowed to be clever?
- What would this look like if someone else had built it?
- What would you sacrifice to make this simple?
- What would happen if you did the opposite of your instinct?
- What would you do if this were the last problem you ever solved?
- What is the thing you keep avoiding looking at?
- What if the real problem is that there is no problem?
- What would generosity look like here?
- What are you optimizing for, and who told you to?
- What would happen if you just waited?
- What would this look like to someone seeing it for the first time in a hundred years?
- What would make this worth doing even if it failed?
- What is the version of this you'd be proud of at 3 AM?
- What would you whisper to someone about to make your mistake?
- If this were music, what genre would it be, and should it be a different one?
- What would you do if elegance were illegal?
- What is the thing this solution is trying to become?
- What if you're solving the right problem at the wrong scale?
- What would this look like if trust were not an issue?
- What is the most honest version of this?
